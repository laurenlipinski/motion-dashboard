<!DOCTYPE html>
<html>
<head>
    <title>CPB Motion Dashboard</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background: #121212;
            color: white;
            padding-top: 50px;
            transition: background 0.2s; /* This makes the color fade smoothly */
        }
        #value { font-size: 120px; font-weight: bold; margin: 20px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; background: #6200ee; color: white; }
        .label { font-size: 24px; color: rgba(255,255,255,0.7); }
    </style>
</head>
<body>

<h1>CPB Motion Tracker</h1>
<button id="connectBtn">Connect to CPB</button>

<div style="margin-top: 80px;">
    <div class="label">Movement Intensity</div>
    <div id="value">0.00</div>
</div>

<script>
    const connectBtn = document.getElementById('connectBtn');
    const valueDisplay = document.getElementById('value');
    let buffer = "";

    const UART_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const UART_TX_CHARACTERISTIC_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

    connectBtn.addEventListener('click', async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'CPB-Motion' }],
                optionalServices: [UART_SERVICE_UUID]
            });

            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(UART_SERVICE_UUID);
            const characteristic = await service.getCharacteristic(UART_TX_CHARACTERISTIC_UUID);

            await characteristic.startNotifications();
            connectBtn.innerText = "Connected!";
            connectBtn.style.background = "#4caf50";

            characteristic.addEventListener('characteristicvaluechanged', (event) => {
                const decoder = new TextDecoder('utf-8');
                const chunk = decoder.decode(event.target.value);
                buffer += chunk;

                if (buffer.includes('\n')) {
                    const lines = buffer.split('\n');
                    const completeLine = lines[0].trim();
                    buffer = lines.slice(1).join('\n');

                    const val = parseFloat(completeLine);

                    if (!isNaN(val)) {
                        valueDisplay.innerText = val.toFixed(2);

                        if (val >= 8.0) {
                            document.body.style.backgroundColor = "red";
                        }
                        else if (val >= 4.0) {
                            document.body.style.backgroundColor = "purple";
                        }
                        else if (val > 1.0) {
                            document.body.style.backgroundColor = "blue";
                        }
                        else {
                            document.body.style.backgroundColor = "#121212";
                        }
                    }
                }
            });
        } catch (error) {
            console.error(error);
            alert("Error: " + error);
        }
    });
</script>
</body>
</html>
