<!DOCTYPE html>
<html>
<head>
    <title>CPB Motion Dashboard</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding-top: 50px; }
        #value { font-size: 100px; font-weight: bold; color: #00e5ff; margin: 20px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; background: #6200ee; color: white; }
        button:hover { background: #3700b3; }
        .label { font-size: 20px; color: #888; }
    </style>
</head>
<body>

<h1>CPB Motion Tracker</h1>
<button id="connectBtn">Connect to CPB</button>

<div style="margin-top: 50px;">
    <div class="label">Movement Intensity</div>
    <div id="value">0.00</div>
</div>

<script>
    const connectBtn = document.getElementById('connectBtn');
    const valueDisplay = document.getElementById('value');

    // These are the standard UUIDs for Nordic UART Service
    const UART_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const UART_TX_CHARACTERISTIC_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

    connectBtn.addEventListener('click', async () => {
        try {
            console.log('Requesting Bluetooth Device...');
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'CPB-Motion' }],
                optionalServices: [UART_SERVICE_UUID]
            });

            console.log('Connecting to GATT Server...');
            const server = await device.gatt.connect();

            console.log('Getting Service...');
            const service = await server.getPrimaryService(UART_SERVICE_UUID);

            console.log('Getting Characteristic...');
            const characteristic = await service.getCharacteristic(UART_TX_CHARACTERISTIC_UUID);

            await characteristic.startNotifications();
            console.log('Notifications started');

            characteristic.addEventListener('characteristicvaluechanged', (event) => {
                const decoder = new TextDecoder('utf-8');
                const text = decoder.decode(event.target.value);
                // Update the UI with the value sent from CPB
                valueDisplay.innerText = parseFloat(text).toFixed(2);

                // Change color based on intensity!
                if(text > 8) valueDisplay.style.color = "red";
                else if(text > 4) valueDisplay.style.color = "purple";
                else if(text > 1) valueDisplay.style.color = "#00e5ff";
                else valueDisplay.style.color = "white";
            });

            connectBtn.innerText = "Connected!";
            connectBtn.style.background = "#4caf50";

        } catch (error) {
            console.error('Connection failed!', error);
            alert("Connection failed: " + error);
        }
    });
</script>
</body>
</html>
