<script>
    const connectBtn = document.getElementById('connectBtn');
    const valueDisplay = document.getElementById('value');
    let buffer = "";

    const UART_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const UART_TX_CHARACTERISTIC_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

    connectBtn.addEventListener('click', async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'CPB-Motion' }],
                optionalServices: [UART_SERVICE_UUID]
            });

            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(UART_SERVICE_UUID);
            const characteristic = await service.getCharacteristic(UART_TX_CHARACTERISTIC_UUID);

            await characteristic.startNotifications();

            characteristic.addEventListener('characteristicvaluechanged', (event) => {
                const decoder = new TextDecoder('utf-8');
                const chunk = decoder.decode(event.target.value);
                buffer += chunk;

                if (buffer.includes('\n')) {
                    const lines = buffer.split('\n');
                    const completeLine = lines[0].trim();
                    buffer = lines.slice(1).join('\n');

                    const val = parseFloat(completeLine);

                    if (!isNaN(val)) {
                        valueDisplay.innerText = val.toFixed(2);

                        // --- NEW COLOR LOGIC ---
                        if (val >= 8.0) {
                            // STRONG -> RED
                            document.body.style.background = "rgb(255, 0, 0)";
                            valueDisplay.style.color = "white";
                        }
                        else if (val >= 4.0) {
                            // MEDIUM -> PURPLE
                            document.body.style.background = "rgb(128, 0, 128)";
                            valueDisplay.style.color = "white";
                        }
                        else if (val > 1.0) {
                            // LIGHT -> BLUE
                            document.body.style.background = "rgb(0, 0, 255)";
                            valueDisplay.style.color = "white";
                        }
                        else {
                            // NO MOVEMENT -> BLACK
                            document.body.style.background = "#121212";
                            valueDisplay.style.color = "#00e5ff";
                        }
                    }
                }
            });

            connectBtn.innerText = "Connected!";
            connectBtn.style.background = "#4caf50";

        } catch (error) {
            console.error(error);
        }
    });
</script>
